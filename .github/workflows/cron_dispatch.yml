name: Daily Market Monitor Trigger

on:
  repository_dispatch:
    types: [cron_trigger]
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Monitor Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # When manually triggered via GitHub UI (workflow_dispatch), force send the report immediately.
          # When triggered by cron-job.org (repository_dispatch), run normally with 1-hour time gate.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger detected — forcing report send."
            python src/main.py --force-report
          else
            echo "Automatic cron trigger — running normally."
            python src/main.py
          fi
